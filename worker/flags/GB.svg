<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30">
  <defs>
    <clipPath id="clip-top-left">
      <polygon points="0,0 30,0 30,15 0,15"/>
    </clipPath>
    <clipPath id="clip-top-right">
      <polygon points="30,0 60,0 60,15 30,15"/>
    </clipPath>
    <clipPath id="clip-bottom-left">
      <polygon points="0,15 30,15 30,30 0,30"/>
    </clipPath>
    <clipPath id="clip-bottom-right">
      <polygon points="30,15 60,15 60,30 30,30"/>
    </clipPath>
  </defs>

  <!-- Blue field -->
  <rect width="60" height="30" fill="#012169"/>

  <!-- St Andrew's cross (white diagonals) -->
  <line x1="0" y1="0"  x2="60" y2="30" stroke="#FFFFFF" stroke-width="6"/>
  <line x1="60" y1="0" x2="0"  y2="30" stroke="#FFFFFF" stroke-width="6"/>

  <!-- St Patrick's cross (red diagonals, offset so it appears halved) -->
  <line x1="0" y1="0"  x2="60" y2="30" stroke="#C8102E" stroke-width="2" clip-path="url(#clip-bottom-left)"/>
  <line x1="0" y1="0"  x2="60" y2="30" stroke="#C8102E" stroke-width="2" clip-path="url(#clip-top-right)"/>
  <line x1="60" y1="0" x2="0"  y2="30" stroke="#C8102E" stroke-width="2" clip-path="url(#clip-top-left)"/>
  <line x1="60" y1="0" x2="0"  y2="30" stroke="#C8102E" stroke-width="2" clip-path="url(#clip-bottom-right)"/>

  <!-- St George's cross (white horizontal and vertical) -->
  <rect x="0"  y="11" width="60" height="8" fill="#FFFFFF"/>
  <rect x="26" y="0"  width="8"  height="30" fill="#FFFFFF"/>

  <!-- St George's cross (red) -->
  <rect x="0"  y="12" width="60" height="6" fill="#C8102E"/>
  <rect x="27" y="0"  width="6"  height="30" fill="#C8102E"/>
</svg>
